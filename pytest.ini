[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# Custom markers
markers =
    unit: Fast isolated unit tests (no I/O, no plotting)
    integration: Multi-module pipeline tests
    plotting: Tests that generate matplotlib/plotly figures (require display or Agg backend)
    slow: Long-running tests (benchmarks, large datasets)
    cli: Command-line interface tests

# Minimum pytest version
minversion = 7.0
