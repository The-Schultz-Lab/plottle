version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"

    # Group the core scientific stack into one PR to avoid churn
    groups:
      scientific-stack:
        patterns:
          - "numpy"
          - "scipy"
          - "pandas"
          - "matplotlib"
          - "seaborn"
          - "plotly"
      streamlit:
        patterns:
          - "streamlit"
      dev-tools:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "pre-commit"
          - "sphinx*"

    # Keep PRs manageable — security updates are handled separately
    open-pull-requests-limit: 5

    commit-message:
      prefix: "deps"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
